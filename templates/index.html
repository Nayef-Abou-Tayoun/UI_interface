<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tactical Incident Dashboard</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}

header{
    background:#1e293b;
    padding:20px;
    font-size:22px;
}

.container{
    padding:20px;
}

.message{
    background:#1e293b;
    padding:15px;
    margin-bottom:10px;
    border-radius:6px;
}

.timestamp{
    font-size:12px;
    color:#94a3b8;
}

.endpoint{
    background:#020617;
    padding:10px;
    margin-bottom:20px;
    border-radius:6px;
}

button{
    padding:10px 16px;
    background:#3b82f6;
    border:none;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

pre{
    white-space:pre-wrap;
    font-size:14px;
}
</style>
</head>

<body>

<header>
⚡ Tactical Operations Dashboard
</header>

<div class="container">

<div class="endpoint">
Webhook Endpoint: <b>/webhook</b>
</div>

<button onclick="clearMessages()">Clear Messages</button>

<h3>Incident Feed</h3>

<div id="messages"></div>

</div>

<script>

const socket = io();

const messagesDiv = document.getElementById("messages");

function addMessage(data){

    const message = document.createElement("div");
    message.className="message";

    const timestamp = document.createElement("div");
    timestamp.className="timestamp";

    timestamp.innerText = data.timestamp || "";

    const content = document.createElement("pre");
    content.innerText = JSON.stringify(data, null, 2);

    message.appendChild(timestamp);
    message.appendChild(content);

    messagesDiv.prepend(message);
}

socket.on("connect", ()=>{
    console.log("Connected to server");
})

socket.on("new_message", msg=>{
    addMessage(msg.data);
})

socket.on("message_history", data=>{
    data.messages.forEach(m=>{
        addMessage(m)
    })
})

socket.on("messages_cleared", ()=>{
    messagesDiv.innerHTML="";
})

function clearMessages(){
    socket.emit("clear_messages");
}

</script>

</body>
</html>
