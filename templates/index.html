<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Tactical Info Output</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
background:#060606;
font-family:"Courier New", monospace;
color:#7fb069;
margin:0;
padding:40px;
}

.container{
border:2px solid #1f3b1f;
max-width:1200px;
margin:auto;
box-shadow:0 0 30px rgba(0,255,0,0.08);
}

header{
padding:30px;
border-bottom:1px solid #1f3b1f;
background:linear-gradient(90deg,#0a1f0a,#0f2e0f);
}

h1{
letter-spacing:4px;
font-size:28px;
margin:0;
color:#9fdc89;
}

.subtitle{
font-size:12px;
opacity:.8;
margin-top:8px;
}

.status{
text-align:center;
padding:10px;
border-bottom:1px solid #1f3b1f;
background:#0d210d;
}

.controls{
display:flex;
justify-content:space-between;
padding:12px 30px;
border-bottom:1px solid #1f3b1f;
background:#081808;
}

.stats{
display:flex;
gap:40px;
}

button{
background:#0b1e0b;
border:1px solid #1f3b1f;
color:#9fdc89;
padding:6px 16px;
cursor:pointer;
font-family:"Courier New";
}

button:hover{
background:#1f3b1f;
}

#messages{
height:520px;
overflow:auto;
padding:25px;
background:#050505;
}

.message{
border-left:3px solid #7fb069;
padding:12px;
margin-bottom:12px;
background:#0b0b0b;
}

.time{
font-size:11px;
color:#c4e3b2;
margin-bottom:5px;
}

.field{
margin:4px 0;
}

.label{
color:#9fdc89;
font-weight:bold;
}

.value{
color:#b8e6a1;
}

.empty{
text-align:center;
padding:100px;
opacity:.4;
}

footer{
text-align:center;
padding:10px;
border-top:1px solid #1f3b1f;
background:#081808;
font-size:12px;
}

code{
background:#0a1a0a;
border:1px solid #1f3b1f;
padding:2px 6px;
}

</style>

</head>

<body>

<div class="container">

<header>
<h1>TACTICAL INFO OUTPUT</h1>
<div class="subtitle">REAL-TIME DATA MONITORING SYSTEM</div>
</header>

<div class="status">
● CONNECTED — SYSTEM ACTIVE
</div>

<div class="controls">

<div class="stats">
<div>OUTPUTS: <span id="count">0</span></div>
<div>UPTIME: <span id="uptime">00:00</span></div>
</div>

<button onclick="clearMessages()">CLEAR</button>

</div>

<div id="messages">

<div class="empty" id="empty">
AWAITING DATA OUTPUT
</div>

</div>

<footer>
ENDPOINT:
<code id="endpoint"></code>
</footer>

</div>

<script>

const socket = io();

const messagesDiv = document.getElementById("messages");
const countSpan = document.getElementById("count");
const uptimeSpan = document.getElementById("uptime");
const endpointSpan = document.getElementById("endpoint");

endpointSpan.textContent = `${window.location.origin}/webhook`;

let messages = 0;
let start = Date.now();

setInterval(()=>{
let s = Math.floor((Date.now()-start)/1000);
let m = Math.floor(s/60);
s = s % 60;

uptimeSpan.textContent =
String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

},1000);


socket.on("message_history",data=>{
data.messages.forEach(addMessage)
});

socket.on("new_message",msg=>{
addMessage(msg.data)
});


function addMessage(data){

let empty = document.getElementById("empty");
if(empty) empty.remove();

let div = document.createElement("div");
div.className = "message";

let time =
data.timestamp ?
new Date(data.timestamp).toLocaleString()
:
new Date().toLocaleString();

let html = `<div class="time">${time}</div>`;

for(let k in data){

if(k==="timestamp") continue;

let v = data[k];

if(typeof v === "object")
v = JSON.stringify(v);

html += `
<div class="field">
<span class="label">${k}:</span>
<span class="value">${v}</span>
</div>
`;

}

div.innerHTML = html;

messagesDiv.prepend(div);

messages++;
countSpan.textContent = messages;

}


function clearMessages(){

socket.emit("clear_messages");

messagesDiv.innerHTML = "";
countSpan.textContent = "0";

}

</script>

</body>
</html>
