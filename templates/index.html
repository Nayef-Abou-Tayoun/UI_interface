<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tactical Info Output</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Courier New',monospace;
background:#0a0a0a;
min-height:100vh;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:#1a1a1a;
border:2px solid #2d4a2b;
box-shadow:0 0 20px rgba(45,74,43,0.3);
}

header{
background:#132013;
color:#7fb069;
padding:20px 30px;
border-bottom:2px solid #2d4a2b;
}

h1{
font-size:1.6em;
letter-spacing:2px;
text-transform:uppercase;
}

.subtitle{
font-size:0.85em;
opacity:0.8;
margin-top:5px;
}

#status{
padding:10px;
text-align:center;
font-size:0.9em;
border-bottom:1px solid #2d4a2b;
}

.connected{
background:#132013;
color:#7fb069;
}

.disconnected{
background:#2a1a1a;
color:#d4a574;
}

.controls{
padding:12px 30px;
background:#0d1f0d;
display:flex;
justify-content:space-between;
border-bottom:1px solid #2d4a2b;
}

.stats{
display:flex;
gap:30px;
font-size:0.85em;
color:#7fb069;
}

.stat-value{
color:#d4a574;
font-weight:700;
margin-left:8px;
}

button{
padding:6px 14px;
background:#1a2f1a;
color:#7fb069;
border:1px solid #2d4a2b;
cursor:pointer;
font-family:'Courier New';
}

button:hover{
background:#2d4a2b;
}

#outputs{
height:550px;
overflow-y:auto;
padding:20px;
background:#0a0a0a;
}

.output{
background:#1a1a1a;
border-left:3px solid #7fb069;
padding:12px;
margin-bottom:10px;
}

.time{
font-size:0.75em;
color:#d4a574;
margin-bottom:5px;
}

.field{
margin:3px 0;
}

.label{
color:#7fb069;
font-weight:bold;
margin-right:6px;
}

.value{
color:#a8c99c;
}

.empty{
text-align:center;
padding:100px;
color:#3d5a3b;
}

footer{
padding:12px;
text-align:center;
background:#0d1f0d;
border-top:1px solid #2d4a2b;
font-size:0.75em;
color:#3d5a3b;
}

footer code{
color:#7fb069;
background:#1a1a1a;
padding:2px 6px;
border:1px solid #2d4a2b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>TACTICAL INFO OUTPUT</h1>
<p class="subtitle">REAL-TIME FIELD VISUAL DETECTION</p>
</header>

<div id="status">CONNECTING...</div>

<div class="controls">

<div class="stats">
<div>OUTPUTS <span class="stat-value" id="count">0</span></div>
<div>TIME <span class="stat-value" id="time">00:00:00</span></div>
</div>

<button onclick="clearOutputs()">CLEAR</button>

</div>

<div id="outputs">

<div class="empty" id="empty">
AWAITING DATA OUTPUT
</div>

</div>

<footer>
ENDPOINT:
<code id="endpoint"></code>
</footer>

</div>

<script>

const socket = io();

const outputs=document.getElementById("outputs");
const status=document.getElementById("status");
const count=document.getElementById("count");
const endpoint=document.getElementById("endpoint");
const time=document.getElementById("time");

endpoint.textContent = `${window.location.origin}/webhook`;

let messages=0;

/* 24H CLOCK */

setInterval(()=>{

const now=new Date();

const hours=String(now.getHours()).padStart(2,'0');
const minutes=String(now.getMinutes()).padStart(2,'0');
const seconds=String(now.getSeconds()).padStart(2,'0');

time.textContent=`${hours}:${minutes}:${seconds}`;

},1000);

/* SOCKET EVENTS */

socket.on("connect",()=>{
status.textContent="CONNECTED";
status.className="connected";
});

socket.on("disconnect",()=>{
status.textContent="DISCONNECTED";
status.className="disconnected";
});

socket.on("message_history",(data)=>{
data.messages.forEach(addOutput);
});

socket.on("new_message",(msg)=>{
addOutput(msg.data,true);
});

socket.on("messages_cleared",()=>{
outputs.innerHTML="";
messages=0;
count.textContent=0;

const empty=document.createElement("div");
empty.className="empty";
empty.id="empty";
empty.textContent="AWAITING DATA OUTPUT";

outputs.appendChild(empty);
});

/* ADD OUTPUT */

function addOutput(data,newItem=false){

let empty=document.getElementById("empty");
if(empty) empty.remove();

let div=document.createElement("div");
div.className="output";

let timeStamp=data.timestamp
?new Date(data.timestamp).toLocaleString()
:new Date().toLocaleString();

let html=`<div class="time">${timeStamp}</div>`;

for(let k in data){

if(k==="timestamp") continue;

let label = k==="message" ? "Detected Object" : k;

let v=data[k];

if(typeof v==="object"){
v=JSON.stringify(v);
}

html+=`<div class="field">
<span class="label">${label}:</span>
<span class="value">${v}</span>
</div>`;
}

div.innerHTML=html;

outputs.prepend(div);

messages++;
count.textContent=messages;

if(newItem) beep();

}

/* CLEAR OUTPUTS */

function clearOutputs(){

if(confirm("CLEAR ALL OUTPUTS?")){

socket.emit("clear_messages");

outputs.innerHTML="";
messages=0;
count.textContent=0;

}

}

/* ALERT SOUND */

function beep(){

let ctx=new(window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.connect(gain);
gain.connect(ctx.destination);

osc.frequency.value=650;

gain.gain.setValueAtTime(0.15,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);

osc.start();
osc.stop(ctx.currentTime+0.15);

}

</script>

</body>
</html>
